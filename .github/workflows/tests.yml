name: Tests

on:
  - push
  - pull_request

jobs:
  tests:
    name: ${{ matrix.session }} ${{ matrix.python }} / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Perform all checks against latest 3.* python
          # - { python: "3.x", os: "ubuntu-latest", session: "pre-commit" }
          # - { python: "3.x", os: "ubuntu-latest", session: "safety" }
          # - { python: "3.x", os: "ubuntu-latest", session: "xdoctest" }
          # - { python: "3.x", os: "ubuntu-latest", session: "docs-build" }
          # - { python: "3.x", os: "ubuntu-latest", session: "mypy" }
          # - { python: "3.10", os: "ubuntu-latest", session: "typeguard" }

          - { python: "3.x", os: "ubuntu-latest", session: "tests" }
          # - { python: "3.x", os: "windows-latest", session: "tests" }
          # - { python: "3.x", os: "macos-latest", session: "tests" }

          # Perform tests in older versions of python
          # - { python: "3.11", os: "ubuntu-latest", session: "tests" }
          # - { python: "3.10", os: "ubuntu-latest", session: "tests" }

    steps:
      - name: Check out the repository
        uses: actions/checkout@v7.0.0

      - name: Set up uv with Python ${{ matrix.python }}
        uses: astral-sh/setup-uv@v8
        with:
          python-version: ${{ matrix.python }}

      - name: Install project
        run: uv sync --locked --all-extras --dev

      - name: Run tests
        run: uv run pytest tests

  coverage:
    runs-on: ubuntu-latest
    needs: tests
    steps:
      - name: Check out the repository
        uses: actions/checkout@v7.0.0

      - name: Set up Python
        uses: actions/setup-python@v6.3.0
        with:
          python-version: "3.12"

      - name: Install Nox
        run: |
          pipx install nox

      - name: Download coverage data
        uses: actions/download-artifact@v8.0.1
        with:
          name: coverage-data

      - name: Combine coverage data and display human readable report
        run: |
          nox --force-color --session=coverage

      - name: Create coverage report
        run: |
          nox --force-color --session=coverage -- xml

      - name: Upload coverage report
        uses: codecov/codecov-action@v7
