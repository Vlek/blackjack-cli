name: Release

on:
  push:
    branches:
      - main
      - master

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 2

      - name: Install uv latest
        uses: astral-sh/setup-uv@v8.3.2
        run: uv pip install --upgrade pip

      - name: Install the project
        run: uv sync --locked --all-extras --dev

      # - name: Check if there is a parent commit
      #   id: check-parent-commit
      #   run: |
      #     echo "::set-output name=sha::$(git rev-parse --verify --quiet HEAD^)"

      # TODO: Should we throw an exception here if there's no parent commit?
      # - name: Detect and tag new version
      #   id: check-version
      #   if: steps.check-parent-commit.outputs.sha
      #   uses: salsify/action-detect-and-tag-new-version@v2.0.3
      #   with:
      #     version-command: |
      #       bash -o pipefail -c "poetry version | awk '{ print \$2 }'"

      # - name: Detect and tag new version
      #   id: check-version
      #   if: steps.check-parent-commit.outputs.sha
        # get current version
        # get previous version
        # if current version != previous version,
        #   form version tag
        #   if version tag does not exist in repo,
        #     tag release
        #   else
        #     throw exception(?)

      - name: Build package
        run: uv build

      - name: Publish package on PyPI
        # if: steps.check-version.outputs.tag
        run: uv publish --token ${{ secrets.PYPI_TOKEN }}

      # - name: Bump version for developmental release
      #   if: "! steps.check-version.outputs.tag"
      #   run: uv version --bump patch --bump dev=$(date +%s)

      # - name: Publish package on TestPyPI
      #   if: "! steps.check-version.outputs.tag"
      #   run: uv publish --token ${{ secrets.TEST_PYPI_TOKEN }} --index testpypi

      - name: Publish the release notes
        uses: release-drafter/release-drafter@v7
        with:
          publish: ${{ steps.check-version.outputs.tag != '' }}
          tag: ${{ steps.check-version.outputs.tag }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
